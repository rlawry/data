<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATA QUEST</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0000AA;
    color: #FFFFFF;
    font-family: 'Courier New', Courier, monospace;
    font-size: 17px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  .bar {
    background: #AAAAAA;
    color: #000080;
    padding: 3px 16px;
    font-weight: bold;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    letter-spacing: .5px;
  }
  .bar-hint {
    font-weight: normal;
    font-size: 13px;
    color: #000060;
  }

  /* ── Level 1 text area ── */
  #screen {
    flex: 1;
    padding: 12px 22px 4px;
    overflow-y: auto;
    overflow-x: hidden;
    min-height: 0;
  }
  #screen::-webkit-scrollbar { width: 0; }

  .line {
    white-space: pre-wrap;
    word-wrap: break-word;
    min-height: 1.5em;
  }
  .c-white  { color: #FFFFFF; }
  .c-yellow { color: #FFFF55; }
  .c-green  { color: #55FF55; }
  .c-red    { color: #FF5555; }
  .c-cyan   { color: #55FFFF; }
  .c-bright { color: #FFFFFF; font-weight: bold; }

  .type-cur {
    display: inline-block;
    width: 9px;
    height: 15px;
    background: #FFFFFF;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  /* ── Level 2 canvas ── */
  #l2-canvas {
    display: none;
    flex: 1;
    min-height: 0;
    background: #0000AA;
  }

  /* ── Input row ── */
  #input-row {
    padding: 4px 22px 8px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    min-height: 32px;
  }
  #prompt-glyph { color: #FFFFFF; margin-right: 6px; }
  #echo-text    { color: #FFFF55; }

  #blk-cursor {
    display: inline-block;
    width: 9px;
    height: 15px;
    background: #FFFFFF;
    vertical-align: text-bottom;
    margin-left: 1px;
    opacity: 0;
  }
  #blk-cursor.on    { opacity: 1; }
  #blk-cursor.blink { animation: blink .65s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #real-input { position: fixed; top: -9999px; left: -9999px; opacity: 0; }

  /* ── Level 4 animated value display ── */
  .l4-block {
    text-align: center;
    border: 2px solid #2222BB;
    background: rgba(0, 0, 55, 0.80);
    padding: 14px 24px 12px;
    margin: 10px 2px;
  }
  .l4-topic {
    color: #55FFFF;
    font-size: 13px;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }
  .l4-numval {
    color: #FFFF55;
    font-size: 62px;
    font-weight: bold;
    line-height: 1.1;
    transition: color .3s;
  }
  .l4-unitval {
    color: #AAFFAA;
    font-size: 30px;
    font-weight: bold;
    margin-left: 6px;
    vertical-align: middle;
  }
  .l4-trend {
    font-size: 26px;
    margin-top: 6px;
    transition: opacity .4s;
  }

  /* ── Level 5 graph block ── */
  .l5-block { text-align: center; margin: 10px 0 4px; }
  .l5-block svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }

  /* ── Level 3 passage block (user must select text from here) ── */
  .passage {
    user-select: text;
    cursor: text;
    color: #FFFF55;
    border-left: 3px solid #5555FF;
    padding: 6px 12px;
    margin: 6px 0 6px 4px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
</style>
</head>
<body>

<div class="bar">
  <span>&#9608;&#9608; DATA QUEST v1.0</span>
  <span id="level-title">LEVEL 1 &mdash; TYPES OF DATA</span>

<div id="screen"></div>
<canvas id="l2-canvas"></canvas>

  <span id="blk-cursor"></span>

// ═══════════════════════════════════════════════════════════
//  LEVEL 1 HELPERS
// ═══════════════════════════════════════════════════════════
const sleep = ms => new Promise(r => setTimeout(r, ms));

function addLine(text, cls = 'c-white') {
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.textContent = text === '' ? ' ' : text;
  screenEl.appendChild(d);
  screenEl.scrollTop = screenEl.scrollHeight;
  return d;
}

async function typeLine(text, cls = 'c-white', speed = CHAR_MS) {
  if (text === '') { addLine(''); await sleep(LINE_GAP); return; }
  const d  = document.createElement('div');
  d.className = 'line ' + cls;
  const ts = document.createElement('span');
  const cs = document.createElement('span');
  cs.className = 'type-cur';
  d.appendChild(ts);
  d.appendChild(cs);
  screenEl.appendChild(d);
  for (let i = 0; i < text.length; i++) {
    ts.textContent += text[i];
    screenEl.scrollTop = screenEl.scrollHeight;
    await sleep(speed);
  }
  d.removeChild(cs);
  await sleep(LINE_GAP);
}

// ═══════════════════════════════════════════════════════════
//  INPUT CONTROL
// ═══════════════════════════════════════════════════════════
function openInput(glyph = '>') {
  inputLive = true;
  currentTxt = '';
  glyphEl.textContent = glyph + ' ';
  echoEl.textContent  = '';
  cursorEl.className  = 'blink on';
  realInput.value     = '';
  realInput.focus();
}
function closeInput() {
  inputLive = false;
  glyphEl.textContent = '';
  echoEl.textContent  = '';
  cursorEl.className  = '';
}

realInput.addEventListener('keydown', e => {
  if (inLevel2 || !inputLive) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = currentTxt.trim();
    if (!val) return;
    closeInput();
    handleInput(val);
  } else if (e.key === 'Backspace') {
    currentTxt = currentTxt.slice(0, -1);
    echoEl.textContent = currentTxt;
  } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && currentTxt.length < 300) {
    currentTxt += e.key;
    echoEl.textContent = currentTxt;
  }
});

document.addEventListener('click', e => {
  if (!inLevel2 && inputLive && !e.target.closest('.passage')) realInput.focus();
});

// Paste support - document-level so it fires even when realInput isn't focused.
// This is critical for Level 3: user selects passage text, Ctrl+C, then Ctrl+V
// anywhere on the page to submit without needing to click into the input first.
document.addEventListener('paste', e => {
  if (inLevel2 || !inputLive) return;
  e.preventDefault();
  const pasted = (e.clipboardData || window.clipboardData).getData('text');
  currentTxt = pasted.replace(/\s+/g, ' ').trim().slice(0, 300);
  echoEl.textContent = currentTxt;
  realInput.focus();   // focus so Enter key submission works immediately
});

// ═══════════════════════════════════════════════════════════
//  SCRIPT RUNNER
// ═══════════════════════════════════════════════════════════
async function runScript(lines) {
  for (const ln of lines) {
    if (ln.r === 'c')      { await typeLine(ln.t, 'c-white'); }
    else if (ln.r === 'p') { await typeLine(ln.t, 'c-cyan'); break; }
  }
}

// ═══════════════════════════════════════════════════════════
//  INPUT HANDLER
// ═══════════════════════════════════════════════════════════
async function handleInput(raw) {
  const lo = raw.toLowerCase().trim();

  if (phase === 'intro') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(yes|y|yep|yeah|ok|sure|alright|got it|i do)$/i.test(lo)) {
      phase = 'teaching';
      await runScript(TEACHING);
      openInput();
    } else {
      await typeLine('PLEASE TYPE  YES  WHEN YOU ARE READY.', 'c-cyan');
      openInput();
    }

  } else if (phase === 'teaching') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(ready|yes|ok|go|sure|let.?s go|start|begin)$/i.test(lo)) {
      phase = 'playing';
      await typeLine('EXCELLENT!  HERE COME YOUR 10 EXAMPLES.  GOOD LUCK!', 'c-white');
      addLine('');
      await askQ();
    } else {
      await typeLine('TYPE  READY  WHEN YOU WANT TO START THE QUIZ!', 'c-cyan');
      openInput();
    }

  } else if (phase === 'playing') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (!VALID.has(lo)) {
      await typeLine('PLEASE TYPE ONE OF THE VALID ANSWERS:', 'c-cyan');
      await typeLine('  qualitative  |  quantitative / numerical  |  relative', 'c-cyan');
      openInput();
      return;
    }
    const normalize = v => (v === 'numerical' ? 'quantitative' : v);
    const q = QS[qIdx];
    const okMsg  = typeof q.ok  === 'function' ? q.ok(lo)  : q.ok;
    const badMsg = typeof q.bad === 'function' ? q.bad(lo) : q.bad;
    if (normalize(lo) === normalize(q.ans)) {
      score++;
      scoreEl.textContent = score;
      await typeLine(okMsg, 'c-green');
    } else {
      await typeLine(badMsg, 'c-red');
      await typeLine(q.hint, 'c-cyan');
    }
    qIdx++;
    if (qIdx >= QS.length) { await endGame(); }
    else { addLine(''); await askQ(); }

  } else if (phase === 'done') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(level.?2|next|continue|l2)$/i.test(lo)) {
      phase = 'l2-brief';
      await runScript(L2_BRIEF);
      openInput();
    } else if (/^(play.?again|restart|again|new.?game|retry)$/i.test(lo)) {
      resetGame();
    } else {
      await typeLine('TYPE  LEVEL 2  to play Data Catcher, or  PLAY AGAIN  to restart.', 'c-cyan');
      openInput();
    }

  } else if (phase === 'l2-brief') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(ready|yes|ok|go|start|begin|let.?s go)$/i.test(lo)) {
      closeInput();
      await sleep(300);
      startLevel2();
    } else {
      await typeLine('TYPE  READY  TO BEGIN LEVEL 2!', 'c-cyan');
      openInput();
    }

  } else if (phase === 'l3-brief') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(ready|yes|ok|go|start|begin|let.?s go)$/i.test(lo)) {
      phase = 'l3-playing';
      l3Idx = 0; l3Score = 0;
      scoreEl.textContent  = '0';
      scoreDenom.textContent = `/ ${L3_PASSAGES.length}`;
      await typeLine('EXCELLENT!  HERE IS YOUR FIRST PASSAGE.', 'c-white');
      addLine('');
      await l3AskQ();
    } else {
      await typeLine('TYPE  READY  TO BEGIN LEVEL 3!', 'c-cyan');
      openInput();
    }

  } else if (phase === 'l3-playing') {
    const display = raw.length > 60 ? raw.slice(0, 57) + '...' : raw;
    addLine('> ' + display, 'c-yellow');
    addLine('');
    const q = L3_PASSAGES[l3Idx];

    if (l3CheckAnswer(raw, q.answer)) {
      l3Score++;
      scoreEl.textContent = l3Score;
      await typeLine('CORRECT!  THAT IS THE ' + q.type + ' EVIDENCE!', 'c-green');
      await typeLine('"' + q.answer + '"', 'c-green', 14);
      l3Idx++;
      if (l3Idx >= L3_PASSAGES.length) {
        await l3EndGame();
      } else {
        addLine('');
        await sleep(400);
        await l3AskQ();
      }
    } else {
      const err = l3ClassifyError(raw, q);
      if (err === 'overload') {
        await typeLine('MEMORY OVERLOAD!', 'c-red', 30);
        await typeLine('YOU SELECTED THE ENTIRE PASSAGE.', 'c-red');
        await typeLine('REDUCE YOUR SELECTION -- COPY ONLY THE EVIDENCE PHRASE.', 'c-cyan');
      } else if (err === 'too-many') {
        await typeLine('YOU HAVE SELECTED TOO MANY WORDS!', 'c-red', 25);
        await typeLine('SELECT ONLY THE ' + q.type + ' EVIDENCE -- A SHORTER PHRASE.', 'c-cyan');
      } else {
        await typeLine('DOES NOT COMPUTE!', 'c-red', 30);
        await typeLine('THAT IS NOT THE ' + q.type + ' EVIDENCE.', 'c-red');
        await typeLine(q.hint, 'c-cyan');
      }
      await typeLine('RE-READ THE PASSAGE AND TRY AGAIN.', 'c-white');
      openInput('>');
    }

  } else if (phase === 'done-l3') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(level.?4|next|continue|l4)$/i.test(lo)) {
      phase = 'l4-brief';
      levelTitle.textContent  = 'LEVEL 4 - OBSERVE & CLASSIFY';
      hintLeft.textContent    = 'Watch the value change, then type  A  or  B';
      hintRight.textContent   = 'Pay close attention!';
      scoreEl.textContent     = '0';
      scoreDenom.textContent  = `/ ${L4_SCENARIOS.length}`;
      await runScript(L4_BRIEF);
      openInput();
    } else if (/^(play.?again|restart|again|new.?game|retry)$/i.test(lo)) {
      resetGame();
    } else {
      await typeLine('TYPE  LEVEL 4  to continue, or  PLAY AGAIN  to restart.', 'c-cyan');
      openInput();
    }

  } else if (phase === 'l4-brief') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(ready|yes|ok|go|start|begin|let.?s go)$/i.test(lo)) {
      phase = 'l4-playing';
      l4Idx = 0; l4Score = 0;
      scoreEl.textContent = '0';
      await l4RunScenario();
    } else {
      await typeLine('TYPE  READY  TO BEGIN LEVEL 4!', 'c-cyan');
      openInput();
    }

  } else if (phase === 'l4-playing') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (lo !== 'a' && lo !== 'b') {
      await typeLine('PLEASE TYPE  A  OR  B  TO SELECT YOUR ANSWER.', 'c-cyan');
      openInput('>');
      return;
    }
    const s = L4_SCENARIOS[l4Idx];
    if (lo.toUpperCase() === s.correct) {
      l4Score++;
      scoreEl.textContent = l4Score;
      await typeLine('CORRECT!  ' + s.explain, 'c-green');
    } else {
      await typeLine('DOES NOT COMPUTE!  ' + s.explain, 'c-red');
      await typeLine('CORRECT ANSWER WAS  ' + s.correct + ':  "' + s[s.correct].text + '"', 'c-cyan', 16);
    }
    l4Idx++;
    if (l4Idx >= L4_SCENARIOS.length) {
      await l4EndGame();
    } else {
      addLine('');
      await sleep(600);
      await l4RunScenario();
    }

  } else if (phase === 'done-l4') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(level.?5|next|continue|l5)$/i.test(lo)) {
      phase = 'l5-brief';
      levelTitle.textContent = 'LEVEL 5 - GRAPH & CLASSIFY';
      hintLeft.textContent   = 'Study the graph, then type  A  or  B';

      scoreDenom.textContent = `/ ${L5_GRAPHS.length}`;
      await runScript(L5_BRIEF);
      openInput();
    } else if (/^(play.?again|restart|again|new.?game|retry)$/i.test(lo)) {
      resetGame();
    } else {
      await typeLine('TYPE  LEVEL 5  to continue, or  PLAY AGAIN  to restart.', 'c-cyan');
      openInput();
    }

  } else if (phase === 'l5-brief') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^(ready|yes|ok|go|start|begin|let.?s go)$/i.test(lo)) {
      phase = 'l5-playing';
      l5Idx = 0; l5Score = 0;
      scoreEl.textContent = '0';
      await l5RunScenario();
    } else {
      await typeLine('TYPE  READY  TO BEGIN LEVEL 5!', 'c-cyan');
      openInput();
    }

  } else if (phase === 'l5-playing') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (lo !== 'a' && lo !== 'b') {
      await typeLine('PLEASE TYPE  A  OR  B  TO SELECT YOUR ANSWER.', 'c-cyan');
      openInput('>');
      return;
    }
    const g = L5_GRAPHS[l5Idx];
    if (lo.toUpperCase() === g.correct) {
      l5Score++;
      scoreEl.textContent = l5Score;
      await typeLine('CORRECT!  ' + g.explain, 'c-green');
    } else {
      await typeLine('DOES NOT COMPUTE!  ' + g.explain, 'c-red');
      await typeLine('CORRECT ANSWER WAS  ' + g.correct + ':  "' + g[g.correct].text + '"', 'c-cyan', 16);
    }
    l5Idx++;
    if (l5Idx >= L5_GRAPHS.length) {
      await l5EndGame();
    } else {
      addLine('');
      await sleep(600);
      await l5RunScenario();
    }

  } else if (phase === 'name-entry') {
    const name = raw.trim().slice(0, 30) || 'STUDENT';
    playerName = name;
    closeInput();
    screenEl.innerHTML = '';
    await showSummary(name);

  } else if (phase === 'game-over') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^play\s*again$/i.test(lo)) {
      phase = 'confirm-restart';
      await typeLine('ARE YOU SURE?  THIS WILL ERASE YOUR REPORT CARD.', 'c-red', 20);
      await typeLine('TYPE  YES  TO CONFIRM, OR ANYTHING ELSE TO CANCEL.', 'c-cyan');
      openInput('>');
    } else {
      await typeLine('YOUR REPORT CARD IS STILL ON SCREEN.', 'c-cyan');
      await typeLine('TYPE  PLAY AGAIN  (EXACTLY) TO RESTART FROM LEVEL 1.', 'c-white');
      openInput();
    }

  } else if (phase === 'confirm-restart') {
    addLine('> ' + raw.toUpperCase(), 'c-yellow');
    addLine('');
    if (/^yes$/i.test(lo)) {
      resetGame();
    } else {
      phase = 'game-over';
      await typeLine('RESTART CANCELLED.  YOUR REPORT CARD IS PRESERVED.', 'c-green', 18);
      await typeLine('TYPE  PLAY AGAIN  TO RESTART FROM LEVEL 1.', 'c-white');
      openInput();
    }
  }
}

function l2SpawnItem() {
  const type  = L2_ROUND_ORDER[l2Round];
  const types = Object.keys(L2_POOLS);

  // Tier thresholds based on correct catches this round
  // tier 0: 0-3 hits  |  tier 1: 4-7 hits  |  tier 2: 8+ hits
  const tier = l2Hits >= 8 ? 2 : l2Hits >= 4 ? 1 : 0;

  // Target chance drops as tier rises (more distractors flood in)
  const targetChance = [0.55, 0.40, 0.28][tier];
  const pick = Math.random() < targetChance
    ? type
    : types[Math.floor(Math.random() * types.length)];

  const pool = L2_POOLS[pick];
  const text = pool[Math.floor(Math.random() * pool.length)];

  ctx.font = L2_FONT;
  const tw   = ctx.measureText(text).width;
  const maxX = canvasEl.width - tw - 20;
  const x    = 20 + Math.random() * Math.max(0, maxX - 20);

  // Speed scales with round progression AND hit tier
  const baseSpeed = 0.9 + l2Round * 0.25;
  const tierBoost = [0, 0.5, 1.1][tier];
  const speed     = baseSpeed + tierBoost + Math.random() * 1.3;

  l2Items.push({ text, type: pick, x, y: -4, speed, w: tw });
}

function l2DrawHUD() {
  const W   = canvasEl.width;
  const typ = L2_ROUND_ORDER[l2Round];

  // "CATCH:" label top-left
  ctx.font      = L2_FONT_B;
  ctx.fillStyle = '#FFFF55';
  ctx.textAlign = 'left';
  ctx.fillText('CATCH: ' + typ.toUpperCase(), 16, 26);

  // sub-label
  ctx.font      = '13px "Courier New"';
  ctx.fillStyle = '#55FFFF';
  ctx.fillText(L2_ROUND_LABELS[typ], 16, 44);

  // round / score top-right
  ctx.font      = L2_FONT;
  ctx.fillStyle = '#AAAAAA';
  ctx.textAlign = 'right';
  ctx.fillText(`ROUND ${l2Round + 1} OF 4`, W - 16, 26);
  ctx.textAlign = 'left';
}

function l2Loop() {
  if (l2Paused) { l2AnimId = requestAnimationFrame(l2Loop); return; }

  const W  = canvasEl.width;
  const H  = canvasEl.height;
  const bY = H - 34;   // bucket baseline Y

  // Background
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, 0, W, H);

  // Move bucket
  if (l2Keys['ArrowLeft'])  bucket.x = Math.max(0,        bucket.x - bucket.speed);
  if (l2Keys['ArrowRight']) bucket.x = Math.min(W - bucket.w, bucket.x + bucket.speed);

  // Spawn - tier scales with correct catches this round
  l2SpawnT++;
  const tier      = l2Hits >= 8 ? 2 : l2Hits >= 4 ? 1 : 0;
  const interval  = Math.max(28, [82, 58, 38][tier] - l2Round * 5);
  const maxOnScreen = [5, 8, 11][tier];
  if (l2SpawnT >= interval && l2Items.length < maxOnScreen) {
    l2SpawnItem();
    l2SpawnT = 0;
  }

  // Update & draw items
  for (let i = l2Items.length - 1; i >= 0; i--) {
    const it = l2Items[i];
    it.y += it.speed;

    ctx.font      = L2_FONT;
    ctx.fillStyle = '#FFFFFF';
    ctx.textAlign = 'left';
    ctx.fillText(it.text, it.x, it.y);

    // Collision: item baseline hits bucket zone
    if (it.y >= bY - 4) {
      const overlap = it.x < bucket.x + bucket.w && it.x + it.w > bucket.x;
      if (overlap) {
        const hit = it.type === L2_ROUND_ORDER[l2Round]
                 || (it.type === 'numerical'    && L2_ROUND_ORDER[l2Round] === 'quantitative')
                 || (it.type === 'quantitative' && L2_ROUND_ORDER[l2Round] === 'numerical');
        if (hit) {
          l2Score++;
          l2Hits++;
          l2Flashes.push({ x: it.x, y: it.y, text: '+1', color: '#55FF55', life: 35 });
        } else {
          l2Score = Math.max(0, l2Score - 1);
          l2Flashes.push({ x: it.x, y: it.y, text: '-1', color: '#FF5555', life: 35 });
        }
        scoreEl.textContent = l2Score;
      }
      l2Items.splice(i, 1);
    }
  }

  // Draw flashes (+1 / -1 indicators)
  ctx.font = L2_FONT_B;
  for (let i = l2Flashes.length - 1; i >= 0; i--) {
    const f = l2Flashes[i];
    ctx.globalAlpha = f.life / 35;
    ctx.fillStyle   = f.color;
    ctx.textAlign   = 'left';
    ctx.fillText(f.text, f.x, f.y - (35 - f.life) * 0.6);
    f.life--;
    if (f.life <= 0) l2Flashes.splice(i, 1);
  }
  ctx.globalAlpha = 1;

  // Separator line above bucket
  ctx.strokeStyle = '#2222CC';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(0,  bY - 10);
  ctx.lineTo(W,  bY - 10);
  ctx.stroke();

  // Draw bucket
  const dashStr = '-'.repeat(bucket.dashes);
  ctx.font      = L2_FONT;
  ctx.fillStyle = '#FFFF55';
  ctx.textAlign = 'left';
  ctx.fillText(dashStr, bucket.x, bY + 17);

  // HUD
  l2DrawHUD();

  // Round complete?
  if (l2Score >= 10) {
    l2RoundComplete();
    return;
  }

  l2AnimId = requestAnimationFrame(l2Loop);
}

function l2RoundComplete() {
  l2Paused = true;
  cancelAnimationFrame(l2AnimId);
  l2Items  = [];
  l2Flashes = [];

  const W   = canvasEl.width;
  const H   = canvasEl.height;

  // Overlay
  ctx.fillStyle = 'rgba(0,0,60,0.82)';

  ctx.textAlign = 'center';
  ctx.font      = 'bold 22px "Courier New"';
  ctx.fillStyle = '#55FF55';

  l2Round++;

  if (l2Round >= L2_ROUND_ORDER.length) {
    ctx.font      = '17px "Courier New"';
    ctx.fillStyle = '#FFFF55';

    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(`NEXT: CATCH  ${next.toUpperCase()}`, W / 2, H / 2 + 14);

    ctx.font      = '14px "Courier New"';
    ctx.fillText(L2_ROUND_LABELS[next], W / 2, H / 2 + 38);

    ctx.fillText('Get ready...', W / 2, H / 2 + 62);
    ctx.textAlign = 'left';

    setTimeout(() => {
      l2Score = 0;
      l2Hits  = 0;
      scoreEl.textContent = '0';
      l2SpawnT  = 0;
      l2Paused  = false;
      l2AnimId  = requestAnimationFrame(l2Loop);
    }, 2600);
  }
}

function l3Normalize(s) {
  return s.trim().replace(/\s+/g, ' ').toLowerCase();
}

function l3CheckAnswer(pasted, expected) {
  const p = l3Normalize(pasted);
  const e = l3Normalize(expected);
  if (p === e) return true;
  if (p.includes(e)) return true;
  if (e.includes(p) && p.length >= Math.floor(e.length * 0.8)) return true;
  return false;
}

function l3ClassifyError(pasted, q) {
  const p     = l3Normalize(pasted);
  const pass  = l3Normalize(q.passage);
  const ans   = l3Normalize(q.answer);

  // Whole-passage selection: pasted covers ≥70% of the passage characters
  if (p.length >= pass.length * 0.70) return 'overload';

  // Too many words: pasted has more than answer word-count + 3
  const pWords = p.split(/\s+/).filter(Boolean).length;
  const aWords = ans.split(/\s+/).filter(Boolean).length;
  if (pWords > aWords + 3) return 'too-many';

  // Wrong content at roughly the right length
  return 'wrong';
}

function l4AnimateValue(s) {
  return new Promise(resolve => {
    const dir      = s.to > s.from ? '▲' : '▼';
    const dirColor = s.to > s.from ? '#55FF55' : '#FF5555';

    const block   = document.createElement('div');
    block.className = 'l4-block';

    const topicEl = document.createElement('div');
    topicEl.className = 'l4-topic';
    topicEl.textContent = s.topic;

    const numEl   = document.createElement('span');
    numEl.className = 'l4-numval';
    numEl.textContent = s.from.toFixed(s.decimals);

    const unitEl  = document.createElement('span');
    unitEl.className = 'l4-unitval';
    unitEl.textContent = s.unit;

    const numRow  = document.createElement('div');
    numRow.appendChild(numEl);
    numRow.appendChild(unitEl);

    const trendEl = document.createElement('div');
    trendEl.className = 'l4-trend';
    trendEl.style.color   = dirColor;
    trendEl.style.opacity = '0';
    trendEl.textContent   = dir;

    block.appendChild(topicEl);
    block.appendChild(numRow);
    block.appendChild(trendEl);
    screenEl.appendChild(block);
    screenEl.scrollTop = screenEl.scrollHeight;

    // Hold starting value 1.3s, then count to end over 3s
    setTimeout(() => {
      trendEl.style.opacity = '1';
      const totalMs = 3000;
      const fps     = 40;
      const stepMs  = 1000 / fps;
      const steps   = Math.round(totalMs / stepMs);
      let   step    = 0;

      const timer = setInterval(() => {
        step++;
        const t    = step / steps;
        const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        numEl.textContent = (s.from + (s.to - s.from) * ease).toFixed(s.decimals);
        screenEl.scrollTop = screenEl.scrollHeight;
        if (step >= steps) {
          clearInterval(timer);
          numEl.textContent  = s.to.toFixed(s.decimals);
          numEl.style.color  = dirColor;
          setTimeout(resolve, 700);
        }
      }, stepMs);
    }, 1300);
  });
}

// ═══════════════════════════════════════════════════════════
//  LEVEL 5  FUNCTIONS

function l5MakeGraph(g) {
  const W=520, H=310, pL=65, pR=22, pT=36, pB=52;
  const plotW=W-pL-pR, plotH=H-pT-pB;
  const sx = x => pL + (x-g.xMin)/(g.xMax-g.xMin)*plotW;
  const sy = y => pT + plotH - (y-g.yMin)/(g.yMax-g.yMin)*plotH;

  const fmt = v => {
    if (v >= 1000)            return (v/1000).toFixed(v%1000===0?0:1)+'k';
    if (Math.abs(v) < 1 && v !== 0) return v.toFixed(2);
    if (Math.abs(v) < 10)     return v.toFixed(1);
    return Math.round(v)+'';
  };

  let s = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" `
        + `style="font-family:'Courier New',monospace;display:block;max-width:100%;height:auto">`;

  // background
  s += `<rect width="${W}" height="${H}" fill="#000033" rx="4"/>`;

  // grid lines (6 divisions each axis)
  const divs = 5;
  for (let i=0; i<=divs; i++) {
    const gx = (pL + i/divs*plotW).toFixed(1);
    const gy = (pT + i/divs*plotH).toFixed(1);
    s += `<line x1="${gx}" y1="${pT}" x2="${gx}" y2="${pT+plotH}" stroke="#111188" stroke-width="1"/>`;
    s += `<line x1="${pL}" y1="${gy}" x2="${pL+plotW}" y2="${gy}" stroke="#111188" stroke-width="1"/>`;
  }

  // axes
  s += `<line x1="${pL}" y1="${pT}" x2="${pL}" y2="${pT+plotH}" stroke="#888888" stroke-width="2"/>`;
  s += `<line x1="${pL}" y1="${pT+plotH}" x2="${pL+plotW}" y2="${pT+plotH}" stroke="#888888" stroke-width="2"/>`;

  // trendline as polyline (supports both linear and nonlinear)
  const tpts = [];
  for (let i=0; i<=100; i++) {
    const xv = g.xMin + i/100*(g.xMax-g.xMin);
    const yv = g.trendFn(xv);
    if (yv >= g.yMin && yv <= g.yMax) {
      tpts.push(`${sx(xv).toFixed(1)},${sy(yv).toFixed(1)}`);
    }
  }
  if (tpts.length > 1)
    s += `<polyline points="${tpts.join(' ')}" fill="none" stroke="#FFFF55" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  // data points
  for (const p of g.points)
    s += `<circle cx="${sx(p.x).toFixed(1)}" cy="${sy(p.y).toFixed(1)}" r="5" fill="#55FFFF" opacity="0.80"/>`;

  // x-axis tick labels
  for (let i=0; i<=divs; i++) {
    const v  = g.xMin + i/divs*(g.xMax-g.xMin);
    const gx = (pL + i/divs*plotW).toFixed(1);
    s += `<text x="${gx}" y="${pT+plotH+16}" text-anchor="middle" fill="#AAAAAA" font-size="11">${fmt(v)}</text>`;
  }
  // y-axis tick labels
  for (let i=0; i<=divs; i++) {
    const v  = g.yMax - i/divs*(g.yMax-g.yMin);
    const gy = (pT + i/divs*plotH).toFixed(1);
    s += `<text x="${pL-6}" y="${+gy+4}" text-anchor="end" fill="#AAAAAA" font-size="11">${fmt(v)}</text>`;
  }

  // axis labels
  const cx = (pL+plotW/2).toFixed(1);
  const cy = (pT+plotH/2).toFixed(1);
  s += `<text x="${cx}" y="${H-3}" text-anchor="middle" fill="#CCCCCC" font-size="12">${g.xLabel}</text>`;
  s += `<text transform="rotate(-90)" x="${-cy}" y="13" text-anchor="middle" fill="#CCCCCC" font-size="12">${g.yLabel}</text>`;

  // graph title
  s += `<text x="${cx}" y="22" text-anchor="middle" fill="#55FFFF" font-size="13" font-weight="bold">${g.title}</text>`;

  // graph type label (top-right, subtle)
  s += `<text x="${pL+plotW}" y="${pT+13}" text-anchor="end" fill="#4444AA" font-size="10">${g.typeLabel}</text>`;

  s += `</svg>`;
  return s;
}

// ═══════════════════════════════════════════════════════════
//  GORILLAS.BAS  CANVAS  RENDERER
//  Direct translation of QBasic SUB DrawGorilla(x, y, arms)
//  arms=1 → right arm raised (throwing pose)
// ═══════════════════════════════════════════════════════════
function makeGorillaCanvas() {
  const SCL = 6;                // Scl() scale factor
  const W   = 195, H = 265;
  const cv  = document.createElement('canvas');
  cv.width  = W;
  cv.height = H;
  cv.style.cssText = 'float:right;margin:0 0 8px 16px;';

  const ctx = cv.getContext('2d');
  const pi  = Math.PI;
  const OC  = '#FFFF55';        // OBJECTCOLOR
  const BK  = '#000000';        // color 0

  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, 0, W, H);

  const ox = 100, oy = 42;      // gorilla (x, y) — centre-top of head
  const s  = n => n * SCL;      // Scl(n)

  // LINE (x1,y1)-(x2,y2), c, BF  →  fillRect
  const fr = (x1, y1, x2, y2, c) => {
    ctx.fillStyle = c;
    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
  };

  // LINE (x1,y)-(x2,y), c  →  horizontal stroke
  const hl = (x1, x2, y, c) => {
    ctx.strokeStyle = c;
    ctx.lineWidth   = Math.max(2, SCL / 2);
    ctx.lineCap     = 'butt';
    ctx.beginPath();
    ctx.moveTo(x1, y);
    ctx.lineTo(x2, y);
    ctx.stroke();
  };

  // FOR i loop of CIRCLE arcs → single solid filled shape.
  // QBasic draws 5 slightly-offset arc strokes to build a thick band.
  // Here we replace that with one closed path: outer arc (CW) + inner arc (CCW),
  // which Canvas auto-caps at both ends with straight lines → fully filled, no gaps.
  // ocx/ocy = centre of the circle that forms the OUTER boundary of the limb.
  // icx/icy = centre of the circle that forms the INNER boundary.
  const filledBand = (ocx, ocy, icx, icy, r, a0, a1, c) => {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(ocx, ocy, r, a0, a1, false); // outer arc, clockwise
    ctx.arc(icx, icy, r, a1, a0, true);  // inner arc, counter-clockwise (reverses back)
    ctx.closePath();
    ctx.fill();
  };

  // ── HEAD ──────────────────────────────────────────────────
  fr(ox - s(4),   oy,        ox + s(2.9), oy + s(6),  OC);
  fr(ox - s(5),   oy + s(2), ox + s(4),   oy + s(4),  OC);

  // Brow: LINE ..., 0
  hl(ox - s(3), ox + s(2), oy + s(2), BK);

  // Nose: PSET ..., 0  (black nostrils)
  const ny = oy + s(4);
  fr(ox - s(2), ny - 1, ox - s(1), ny + 2, BK);
  fr(ox + s(1), ny - 1, ox + s(2), ny + 2, BK);

  // ── NECK ──────────────────────────────────────────────────
  // Filled rect bridges the head-bottom (y+Scl(6)) to body-top (y+Scl(8)) gap
  fr(ox - s(3), oy + s(6), ox + s(2), oy + s(8), OC);

  // ── BODY ──────────────────────────────────────────────────
  fr(ox - s(8),   oy + s(8),  ox + s(6.9), oy + s(14), OC);
  fr(ox - s(6),   oy + s(14), ox + s(4.9), oy + s(20), OC);  // start at s(14) — no gap

  // ── LEGS ──────────────────────────────────────────────────
  // Right leg: arc 3π/4→9π/8 (lower-left of circles), i=0..4 shifts centres right.
  // Outer boundary = leftmost circle (i=0); inner boundary = rightmost circle (i=4).
  filledBand(
    ox + s(0),  oy + s(25),
    ox + s(4),  oy + s(25),
    s(10), 3*pi/4, 9*pi/8, OC
  );
  // Left leg: arc 15π/8→π/4 (lower-right of circles), i=0..4 shifts centres right.
  // Outer boundary = rightmost circle (i=4); inner boundary = leftmost circle (i=0).
  filledBand(
    ox - s(6) + s(3.9),  oy + s(25),
    ox - s(6) + s(-0.1), oy + s(25),
    s(10), 15*pi/8, pi/4, OC
  );

  // ── CHEST concave (single CIRCLE, color 0 — cuts into body) ─
  // QBasic uses y-up math angles; Canvas uses y-down.  Negate angle + anticlockwise=true.
  // QBasic 3π/2→0   becomes Canvas  π/2→0   CCW  (lower-right arc of left circle)
  // QBasic  π→3π/2  becomes Canvas  π→π/2   CCW  (lower-left  arc of right circle)
  ctx.strokeStyle = BK;
  ctx.lineWidth   = 3;
  ctx.beginPath();
  ctx.arc(ox - s(4.9), oy + s(10), s(4.9), pi/2, 0,    true);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ox + s(4.9), oy + s(10), s(4.9), pi,   pi/2, true);
  ctx.stroke();

  // ── ARMS  CASE 1: right arm raised ────────────────────────
  // Left arm (down): arc 3π/4→5π/4 (left side of circles), i=-5..-1 shifts right.
  // Outer = leftmost circle (i=-5); inner = rightmost circle (i=-1).
  filledBand(
    ox + s(-5.1), oy + s(14),
    ox + s(-1.1), oy + s(14),
    s(9), 3*pi/4, 5*pi/4, OC
  );
  // Right arm (up): arc 7π/4→π/4 (right side of circles), i=-5..-1 shifts right.
  // Outer = rightmost circle (i=-1); inner = leftmost circle (i=-5).
  filledBand(
    ox + s(4.9) + s(-1), oy + s(4),
    ox + s(4.9) + s(-5), oy + s(4),
    s(9), 7*pi/4, pi/4, OC
  );

  return cv;
}

// ═══════════════════════════════════════════════════════════
//  REPORT CARD  &  GORILLA

async function showSummary(name) {
  const total = score + l3Score + l4Score + l5Score;
  const max   = 10 + L3_PASSAGES.length + L4_SCENARIOS.length + L5_GRAPHS.length;
  const pct   = Math.round(total / max * 100);
  const letter = pct >= 90 ? 'A' : pct >= 80 ? 'B' : pct >= 70 ? 'C' : pct >= 60 ? 'D' : 'F';
  const gOf    = p  => p >= 90 ? 'A' : p >= 80 ? 'B' : p >= 70 ? 'C' : p >= 60 ? 'D' : 'F';

  const BAR  = '  ' + '═'.repeat(52);
  const pad  = (s, n) => s + ' '.repeat(Math.max(0, n - s.length));

  const l1p = Math.round(score / 10 * 100);
  const l3p = Math.round(l3Score / L3_PASSAGES.length * 100);
  const l4p = Math.round(l4Score / L4_SCENARIOS.length * 100);
  const l5p = Math.round(l5Score / L5_GRAPHS.length * 100);

  // Build right-aligned score columns
  const row = (label, got, outOf, pctVal, extra) => {
    const scores = `${got} / ${outOf}`;
    const g = extra || gOf(pctVal);
    return '  ' + pad(label, 34) + pad(scores, 8) + '  ' + g;
  };

  await typeLine(BAR, 'c-cyan', 4);
  await typeLine('       DATA QUEST - STUDENT REPORT CARD', 'c-bright', 16);
  await typeLine(BAR, 'c-cyan', 4);
  addLine('');
  await typeLine('  STUDENT:  ' + name.toUpperCase(), 'c-yellow', 14);
  addLine('');
  await typeLine(BAR, 'c-cyan', 4);
  await typeLine(row('LEVEL 1 - TYPES OF DATA',        score,    10,                        l1p), 'c-white', 12);
  await typeLine(row('LEVEL 2 - DATA CATCHER',         4, 4,                              100, 'PASS'), 'c-white', 12);
  await typeLine(row('LEVEL 3 - EVIDENCE HUNT',        l3Score,  L3_PASSAGES.length,        l3p), 'c-white', 12);
  await typeLine(row('LEVEL 4 - OBSERVE & CLASSIFY',   l4Score,  L4_SCENARIOS.length,       l4p), 'c-white', 12);
  await typeLine(row('LEVEL 5 - GRAPH & CLASSIFY',     l5Score,  L5_GRAPHS.length,          l5p), 'c-white', 12);
  await typeLine(BAR, 'c-cyan', 4);
  await typeLine(
    '  ' + pad('OVERALL SCORE:  ' + total + ' / ' + max + '  (' + pct + '%)', 44) + 'GRADE:  ' + letter,
    letter === 'A' ? 'c-green' : letter === 'B' ? 'c-green' : letter === 'C' ? 'c-yellow' : 'c-red',
    14
  );
  await typeLine(BAR, 'c-cyan', 4);

  addLine('');
  await sleep(400);

  // ── Canvas Gorilla - GORILLAS.BAS DRAW string ─────────────
  const gorillaEl = makeGorillaCanvas();
  screenEl.appendChild(gorillaEl);
  screenEl.scrollTop = screenEl.scrollHeight;
  await sleep(200);

  addLine('');
  await typeLine('  -- Hooray, ' + name.toUpperCase() + '! --', 'c-green', 18);

  const praise =
    letter === 'A' ? 'AN OUTSTANDING PERFORMANCE!  YOU ARE A TRUE DATA MASTER!' :
    letter === 'B' ? 'EXCELLENT WORK!  YOU HAVE A STRONG COMMAND OF DATA TYPES!' :
    letter === 'C' ? 'GOOD EFFORT!  KEEP REVIEWING AND YOU WILL MASTER IT ALL!' :
                     'KEEP PRACTICING -- YOU WILL GET THERE!';
  await typeLine('  ' + praise, letter <= 'B' ? 'c-green' : 'c-cyan', 18);

  const clr = document.createElement('div');
  clr.style.clear = 'both';
  screenEl.appendChild(clr);
  addLine('');
  await typeLine(BAR, 'c-cyan', 4);
  await typeLine('  TYPE  PLAY AGAIN  TO RESTART FROM LEVEL 1.', 'c-white');
  levelTitle.textContent = 'DATA QUEST - COMPLETE!';
  phase = 'game-over';
  openInput();
}
